<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenClaw Demo Sandbox</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: white; border-radius: 24px; padding: 48px; max-width: 480px; width: 90%;
          box-shadow: 0 25px 60px rgba(0,0,0,0.2); text-align: center; }
  .logo { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 8px; }
  p { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .badge { display: inline-block; background: #f0f4ff; color: #4f46e5;
           padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
           margin-bottom: 32px; }
  .info { background: #f8fafc; border-radius: 12px; padding: 16px;
          text-align: left; font-size: 13px; color: #64748b; }
  .info span { color: #1a1a2e; font-weight: 600; }
  .pulse { display: inline-block; width: 8px; height: 8px; background: #22c55e;
           border-radius: 50%; margin-right: 8px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🦾</div>
  <h1>OpenClaw Sandbox</h1>
  <div class="badge"><span class="pulse"></span>Running</div>
  <p>这是一个在 Spaces 沙盒中运行的 OpenClaw 演示实例。<br />
  每个用户的实例完全隔离，TTL 到期后自动回收。</p>
  <div class="info">
    <div style="margin-bottom:8px">🐳 Container: <span id="container">sandbox_demo</span></div>
    <div style="margin-bottom:8px">⏱ Started: <span id="started"></span></div>
    <div>🔒 Isolated sandbox environment</div>
  </div>
</div>
<script>
document.getElementById('started').textContent = new Date().toLocaleTimeString()
document.getElementById('container').textContent = 'sandbox_' + Math.random().toString(36).slice(2, 8)
</script>
</body>
</html>
